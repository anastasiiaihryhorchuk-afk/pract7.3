<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Menu</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="menu">
  <h1 class="title">Menu</h1>

  <div class="info">
    <span>Fresh Taste</span>
    <span>10:00 – 22:00</span>
    <span>Asian Kitchen</span>
  </div>

  <section>
    <h2>Starters</h2>

    <div class="item">
      <div>
        <h3>Udon Noodles</h3>
        <p>Thick noodles with soy broth</p>
      </div>
      <span>$9.80</span>
    </div>

    <div class="item">
      <div>
        <h3>Sushi Roll</h3>
        <p>rice, fish & vegetables</p>
      </div>
      <span>$8,17</span>
    </div>
  </section>

  <section>
    <h2>Main Dishes</h2>

    <div class="item">
      <div>
        <h3>Ramen</h3>
        <p>Rich broth, noodles, egg</p>
      </div>
      <span>$12.90</span>
    </div>

    <div class="item">
      <div>
        <h3>Katsu Curry</h3>
        <p>Chicken with curry & rice</p>
      </div>
      <span>$11.20</span>
    </div>
  </section>

  <section>
    <h2>Drinks</h2>

    <div class="item">
      <h3>Matcha Latte</h3>
      <span>$4.20</span>
    </div>

    <div class="item">
      <h3>Soju</h3>
      <span>$2.24</span>
    </div>
  </section>

</div>

</body>
</html>
